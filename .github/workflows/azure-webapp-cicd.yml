name: Build and Deploy Umbraco to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src/TINUmbraco.Web/TINUmbraco.Web.csproj
  PUBLISH_OUTPUT: publish-output

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_OUTPUT }}

      - name: Zip publish output
        run: cd ${{ env.PUBLISH_OUTPUT }} && zip -r ../publish-output.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbraco-webapp
          path: publish-output.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: umbraco-webapp

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        if: ${{ vars.AZURE_STAGING_SLOT != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: ${{ vars.AZURE_STAGING_SLOT }}
          package: publish-output.zip

      - name: Swap staging slot to production
        if: ${{ vars.AZURE_STAGING_SLOT != '' }}
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --name "${{ vars.AZURE_WEBAPP_NAME }}" \
              --slot "${{ vars.AZURE_STAGING_SLOT }}" \
              --target-slot production

      - name: Deploy directly to production
        if: ${{ vars.AZURE_STAGING_SLOT == '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: publish-output.zip
